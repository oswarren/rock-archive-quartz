name: CI — privacy self-test + build

# PRs only — pushes to main are built + gated by deploy.yml (since launch 2026-07-17),
# so this avoids a redundant second build on every push.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v6
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - name: Install Dependencies
        run: npm ci
      - name: Privacy self-test + content scan
        # Self-contained: proves the scanner rejects the known-unsafe fixture in
        # tests/privacy-fixtures/, then requires the real content/ to pass. The
        # private vault is NOT available in CI and is not needed.
        run: node scripts/lint-privacy.mjs --self-test
      - name: Install Quartz plugins
        run: npx quartz plugin install
      - name: Build Quartz
        run: npx quartz build
